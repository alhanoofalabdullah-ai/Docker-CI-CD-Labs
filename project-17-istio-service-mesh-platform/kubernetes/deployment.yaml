apiVersion: apps/v1
kind: Deployment

metadata:
  name: java-app
  namespace: istio-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: java-app

  template:

    metadata:
      labels:
        app: java-app

    spec:

      containers:

      - name: java-app

        image: java-app:v1

        ports:
        - containerPort: 8080
