version: '3.9'

services:

  app:
    build: ./app

    container_name: java_application

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0

    container_name: mysql_database

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: company_db

    ports:
      - "3306:3306"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
