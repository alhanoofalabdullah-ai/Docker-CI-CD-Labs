groups:

- name: infrastructure-alerts

  rules:

  - alert: HighCPUUsage

    expr: cpu_usage > 80

    for: 1m

    labels:
      severity: warning

    annotations:
      summary: CPU usage is above 80%

  - alert: HighMemoryUsage

    expr: memory_usage > 85

    for: 1m

    labels:
      severity: critical

    annotations:
      summary: Memory usage is above 85%
