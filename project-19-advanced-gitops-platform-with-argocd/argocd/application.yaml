apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: enterprise-app

spec:

  project: production

  source:
    repoURL: https://github.com/company/gitops-repository
    targetRevision: main
    path: kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-production

  syncPolicy:

    automated:

      prune: true

      selfHeal: true
